name: Deploy to Kinsta

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          rsync -a \
            --exclude='deploy/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='_source_docs/' \
            . deploy/
          find deploy -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) \
            -exec sed -i 's|/julielichty-com/|/|g' {} +

      - name: Deploy via SFTP
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.KINSTA_HOST }}
          port: ${{ secrets.KINSTA_PORT }}
          username: ${{ secrets.KINSTA_USERNAME }}
          password: ${{ secrets.KINSTA_PASSWORD }}
          localDir: 'deploy/'
          remoteDir: '/www/julielichty_299/public/'
          forceUpload: true
