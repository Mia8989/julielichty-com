name: Deploy to Kinsta

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          rsync -a \
            --exclude='deploy/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='_source_docs/' \
            . deploy/
          find deploy -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) \
            -exec sed -i 's|/julielichty-com/|/|g' {} +

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.KINSTA_HOST }}
          SFTP_PORT: ${{ secrets.KINSTA_PORT }}
          SFTP_USER: ${{ secrets.KINSTA_USERNAME }}
          SFTP_PASS: ${{ secrets.KINSTA_PASSWORD }}
        run: |
          lftp -u "$SFTP_USER,$SFTP_PASS" \
            -e "set sftp:connect-program 'ssh -o StrictHostKeyChecking=no'; \
                set net:max-retries 3; \
                rm -f /www/julielichty_299/public/about; \
                rm -f /www/julielichty_299/public/assets; \
                rm -f /www/julielichty_299/public/blog; \
                rm -f /www/julielichty_299/public/coaching; \
                rm -f /www/julielichty_299/public/contact; \
                rm -f /www/julielichty_299/public/faq; \
                rm -f /www/julielichty_299/public/speaking; \
                rm -f /www/julielichty_299/public/testimonials; \
                mirror --reverse --parallel=4 ./deploy/ /www/julielichty_299/public/; \
                quit" \
            sftp://$SFTP_HOST:$SFTP_PORT
